<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>降价通知</title>
</head>
<body style="margin: 0; padding: 0; background-color: #faf9f7; font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background-color: #faf9f7;">
        <tr>
            <td align="center" style="padding: 48px 16px;">
                <table role="presentation" cellpadding="0" cellspacing="0" width="520" style="max-width: 520px; width: 100%;">

                    <!-- Brand -->
                    <tr>
                        <td style="padding: 0 0 12px; border-bottom: 1px solid #e0ddd8;">
                            <span style="font-size: 13px; color: #999; letter-spacing: 0.5px;">TaobaoProductMonitor</span>
                        </td>
                    </tr>

                    <!-- Product Name -->
                    <tr>
                        <td style="padding: 28px 0 20px;">
                            <p style="margin: 0; font-size: 16px; color: #2d2d2d; line-height: 1.6; font-weight: 500;">
                                {{ product_name }}
                            </p>
                        </td>
                    </tr>

                    <!-- Price Ticket -->
                    <tr>
                        <td style="padding: 0 0 28px;">
                            <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="border: 1px dashed #ccc; border-collapse: collapse;">
                                <tr>
                                    <td style="padding: 20px 24px; border-bottom: 1px dashed #e0ddd8;">
                                        <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                                            <tr>
                                                <td style="font-size: 13px; color: #888; width: 72px;">监控价</td>
                                                <td style="font-size: 18px; color: #999; text-decoration: line-through; text-align: right;">
                                                    ¥{{ original_price | currency }}
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding: 20px 24px; border-bottom: 1px dashed #e0ddd8;">
                                        <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                                            <tr>
                                                <td style="font-size: 13px; color: #888; width: 72px;">当前价</td>
                                                <td style="font-size: 24px; color: #ff5000; font-weight: 700; text-align: right;">
                                                    ¥{{ current_price | currency }}
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding: 16px 24px;">
                                        <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                                            <tr>
                                                <td style="font-size: 13px; color: #888; width: 72px;">降幅</td>
                                                <td style="font-size: 15px; color: #2d2d2d; font-weight: 600; text-align: right;">
                                                    ¥{{ reduction | currency }}
                                                    <span style="color: #ff5000; font-size: 13px; margin-left: 6px;">(-{{ drop_percent | percent }})</span>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- CTA Button -->
                    <tr>
                        <td style="padding: 0 0 36px;" align="center">
                            <a href="{{ product_url }}" target="_blank"
                               style="display: inline-block; padding: 12px 40px; background-color: #ff5000; color: #ffffff; text-decoration: none; border-radius: 2px; font-size: 14px; font-weight: 500; letter-spacing: 1px;">
                                立即查看
                            </a>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding: 16px 0 0; border-top: 1px solid #e0ddd8;">
                            <p style="margin: 0; font-size: 11px; color: #bbb; line-height: 1.8; text-align: center;">
                                由 TaobaoProductMonitor 自动发送 · 关闭商品监控即可停止通知
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
